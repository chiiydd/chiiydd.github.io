{{- /* layouts/search/list.html — pagefind search page

Generated by Hugo for `content/search.md` with `layout: search`.
After every build, run `npx pagefind --site public` so /pagefind/ exists.
*/ -}}
{{ define "main" }}
<div class="search-page">
  <h1 class="page-title"><span class="page-title__hash">#</span> search</h1>
  <p class="page-sub">Powered by pagefind. Indexed at build time, no server.</p>

  <div id="search" class="pagefind-host"></div>
</div>

<script type="module">
  import { PagefindUI } from "/pagefind/pagefind-ui.js";
  new PagefindUI({
    element: "#search",
    showSubResults: true,
    showImages: false,
    resetStyles: false,
    translations: { placeholder: "search posts…" },
  });
</script>
{{ end }}
